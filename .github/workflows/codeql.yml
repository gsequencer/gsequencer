name: "CodeQL Advanced"

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: '44 22 * * 5'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: c-cpp
            build-mode: manual

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          autoconf \
          automake \
          autopoint \
          autotools-dev \
          build-essential \
          gettext \
          pkg-config \
          libglib2.0-dev \
          libgtk-3-dev \
          libgtk-4-dev \
          libaudiofile-dev \
          libsndfile1-dev \
          libsndfile-dev \
          libsamplerate-dev \
          libxml2-dev \
          libsoup-3.0-dev \
          libjson-glib-dev \
          libinstpatch-dev \
          ladspa-sdk \
          dssi-dev \
          lv2-dev \
          libfftw3-dev \
          libasound2-dev \
          libjack-jackd2-dev \
          libpulse-dev \
          libpoppler-glib-dev \
          uuid-dev \
          gobject-introspection \
          libgirepository1.0-dev \
          gstreamer1.0-plugins-base \
          gstreamer1.0-plugins-good \
          libgstreamer1.0-dev \
          libgstreamer-plugins-base1.0-dev

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: c-cpp
        build-mode: manual

    - name: Build
      run: |
        autoreconf -i
        ./configure --enable-silent-rules
        make -j$(nproc)

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:c-cpp"
